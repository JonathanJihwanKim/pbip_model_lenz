name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install package and dev deps
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          ruff check src tests

      - name: Type check (mypy on models)
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          mypy src/model_lenz/models

      - name: Unit tests
        shell: bash
        env:
          MODEL_LENZ_SAMPLE_PBIP: examples/tiny_pbip
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pytest tests -v

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/model_lenz/frontend_dist/
          retention-days: 7

  package:
    name: Build wheel
    needs: [python, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/model_lenz/frontend_dist/

      - name: Install build tools
        run: pip install hatch

      - name: Build sdist + wheel
        run: hatch build

      - name: Verify wheel installs and CLI runs
        run: |
          python -m venv test_env
          ./test_env/bin/pip install dist/model_lenz-*.whl
          ./test_env/bin/model-lenz version
          ./test_env/bin/model-lenz summary examples/tiny_pbip

      - name: Upload wheel and sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
