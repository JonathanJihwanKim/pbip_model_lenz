name: Publish to PyPI

# Triggered by pushing a version tag (e.g. `v0.1.0`) or manually.
#
# Setup (one-time, by repo owner):
#   1. Create the project on PyPI: https://pypi.org/manage/account/publishing/
#   2. Add a "Trusted Publisher" with:
#        Owner:                   JonathanJihwanKim
#        Repository name:         pbip_model_lenz
#        Workflow filename:       release.yml
#        Environment name:        pypi
#   3. In GitHub repo settings -> Environments, create an environment named
#      "pypi" with a required reviewer (yourself) so a release pause for
#      manual approval before publishing.
#
# Once configured, no API token or password is needed — PyPI mints a short-
# lived token from the GitHub OIDC identity for each run.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Build distributions
        run: hatch build

      - name: Verify wheel installs and CLI runs
        run: |
          python -m venv check_env
          ./check_env/bin/pip install --upgrade pip
          ./check_env/bin/pip install dist/model_lenz-*.whl
          ./check_env/bin/model-lenz version
          ./check_env/bin/model-lenz summary examples/tiny_pbip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/model-lenz
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/model-lenz
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach artifacts to GitHub release
    needs: [publish-pypi]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
