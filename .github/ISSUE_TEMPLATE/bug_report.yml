name: Bug report
description: Something parses incorrectly, an endpoint returns wrong data, or the UI misbehaves.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail to reproduce.

  - type: input
    id: version
    attributes:
      label: Model Lenz version
      description: Output of `model-lenz version`
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TMDL parser
        - DAX reference extraction
        - M / Power Query lineage
        - Relationship walker / indirect dependencies
        - Classifier (fact/dim/parameter/time)
        - HTTP API
        - Frontend / visualization
        - CLI / packaging
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you expect, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        If a TMDL/DAX/M snippet triggers the bug, paste it here. Smaller is better.
        Bonus points for adding it as a fixture under `tests/fixtures/edge_cases/`.
      render: text

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python version:
        Browser (if frontend bug):
